<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book & Meet</title>
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'WantedSans';
  src: url('../../fonts/WantedSans-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'WantedSans', 'Noto Sans KR', sans-serif; background: #F7FAFC; color: #2D3748; -webkit-font-smoothing: antialiased; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── TOKENS ───────────────────────────────────────────────
const C = {
  navy900: '#1B2E5E', navy800: '#23407A', navy700: '#2C5282',
  navy600: '#2B6CB0', navy500: '#3182CE', navy400: '#4299E1',
  navy300: '#63B3ED', navy200: '#90CDF4', navy100: '#BEE3F8', navy50: '#EBF8FF',
  gray900: '#1A202C', gray800: '#2D3748', gray700: '#4A5568',
  gray600: '#718096', gray500: '#A0AEC0', gray400: '#CBD5E0',
  gray300: '#E2E8F0', gray200: '#EDF2F7', gray100: '#F7FAFC', white: '#FFFFFF',
  green: '#38A169', greenLight: '#C6F6D5',
  red: '#E53E3E', redLight: '#FED7D7',
  yellow: '#D69E2E', yellowLight: '#FEFCBF',
};

// ── DATA ─────────────────────────────────────────────────
const ROOMS = [
  { id:1, name:'한강뷰룸', floor:'3층', wing:'A동', cap:8, amenities:['프로젝터','화이트보드','자연채광'], status:'available' },
  { id:2, name:'임원 회의실', floor:'5층', wing:'B동', cap:12, amenities:['화상회의','TV 모니터','화이트보드'], status:'available' },
  { id:3, name:'소회의실 201', floor:'2층', wing:'A동', cap:4, amenities:['화이트보드'], status:'booked' },
  { id:4, name:'크리에이티브룸', floor:'4층', wing:'B동', cap:6, amenities:['화이트보드','TV 모니터'], status:'available' },
  { id:5, name:'포커스룸 101', floor:'1층', wing:'A동', cap:3, amenities:['모니터'], status:'available' },
  { id:6, name:'대회의실', floor:'6층', wing:'C동', cap:20, amenities:['프로젝터','화상회의','화이트보드','무선마이크'], status:'booked' },
];

const MY_RESERVATIONS = [
  { id:1, room:'한강뷰룸', floor:'3층', date:'2026.04.19 (금)', time:'11:00 – 12:30', attendees:6, title:'Q2 전략 회의', status:'confirmed' },
  { id:2, room:'임원 회의실', floor:'5층', date:'2026.04.20 (토)', time:'10:00 – 11:00', attendees:4, title:'디자인 리뷰', status:'confirmed' },
  { id:3, room:'크리에이티브룸', floor:'4층', date:'2026.04.16 (화)', time:'14:00 – 15:00', attendees:5, title:'팀 워크숍', status:'past' },
];

// Generate time slots 09:00~18:00
function makeSlots() {
  const slots = [];
  for (let h = 9; h < 18; h++) {
    slots.push(`${String(h).padStart(2,'0')}:00`);
    slots.push(`${String(h).padStart(2,'0')}:30`);
  }
  return slots;
}
const ALL_SLOTS = makeSlots();
const BOOKED_SLOTS = ['09:00','09:30','14:30','15:00','15:30'];
const MY_SLOTS = ['13:00','13:30'];

// ── ICONS (inline SVG) ────────────────────────────────────
const Icon = ({ name, size=16, color='currentColor', strokeWidth=1.8 }) => {
  const paths = {
    calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
    users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
    'map-pin': <><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>,
    search: <><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    bell: <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></>,
    settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
    'log-out': <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
    'check-circle': <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
    x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    home: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    'book-open': <><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></>,
    chevron: <><polyline points="9 18 15 12 9 6"/></>,
    plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    filter: <><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
};

// ── BADGE ─────────────────────────────────────────────────
const Badge = ({ type, children }) => {
  const styles = {
    available: { background: C.greenLight, color: '#276749' },
    booked:    { background: C.redLight, color: '#9B2C2C' },
    confirmed: { background: C.greenLight, color: '#276749' },
    past:      { background: C.gray200, color: C.gray600 },
    mine:      { background: C.navy50, color: C.navy700 },
  };
  const dotColors = { available: C.green, booked: C.red, confirmed: C.green, past: C.gray500, mine: C.navy400 };
  const s = styles[type] || styles.available;
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:4, padding:'3px 9px',
      borderRadius:9999, fontSize:11, fontWeight:500, ...s }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background: dotColors[type], flexShrink:0 }} />
      {children}
    </span>
  );
};

// ── TAG ───────────────────────────────────────────────────
const Tag = ({ children }) => (
  <span style={{ display:'inline-flex', alignItems:'center', padding:'2px 8px', borderRadius:9999,
    fontSize:11, background: C.navy50, color: C.navy600, border:`1px solid ${C.navy100}` }}>
    {children}
  </span>
);

// ── SIDEBAR ───────────────────────────────────────────────
const Sidebar = ({ active, onNav }) => {
  const items = [
    { id:'dashboard', label:'대시보드', icon:'home' },
    { id:'rooms', label:'회의실 찾기', icon:'search' },
    { id:'reservations', label:'내 예약', icon:'calendar' },
  ];
  const bottomItems = [
    { id:'settings', label:'설정', icon:'settings' },
  ];
  return (
    <aside style={{ width:224, background: C.navy900, display:'flex', flexDirection:'column',
      height:'100vh', position:'fixed', left:0, top:0, flexShrink:0 }}>
      {/* Logo */}
      <div style={{ padding:'20px 20px 16px', borderBottom:`1px solid ${C.navy800}` }}>
        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ width:32, height:32, background: C.navy700, borderRadius:8,
            display:'flex', alignItems:'center', justifyContent:'center' }}>
            <Icon name="book-open" size={16} color={C.navy200} />
          </div>
          <div>
            <div style={{ fontSize:14, fontWeight:700, color:C.white, letterSpacing:'-0.3px' }}>Book</div>
            <div style={{ fontSize:11, fontWeight:400, color:C.navy300, marginTop:-2 }}>&amp; Meet</div>
          </div>
        </div>
      </div>
      {/* Nav */}
      <nav style={{ flex:1, padding:'12px 10px' }}>
        {items.map(item => {
          const isActive = active === item.id;
          return (
            <button key={item.id} onClick={() => onNav(item.id)}
              style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'9px 12px',
                borderRadius:6, border:'none', cursor:'pointer', textAlign:'left', marginBottom:2,
                background: isActive ? C.navy700 : 'transparent',
                color: isActive ? C.white : C.navy300,
                fontSize:13, fontWeight: isActive ? 600 : 400,
                transition:'all 150ms', fontFamily:'inherit' }}>
              <Icon name={item.icon} size={16} color={isActive ? C.navy200 : C.navy400} />
              {item.label}
            </button>
          );
        })}
      </nav>
      {/* Bottom */}
      <div style={{ padding:'12px 10px', borderTop:`1px solid ${C.navy800}` }}>
        {bottomItems.map(item => (
          <button key={item.id} onClick={() => onNav(item.id)}
            style={{ display:'flex', alignItems:'center', gap:10, width:'100%', padding:'9px 12px',
              borderRadius:6, border:'none', cursor:'pointer', textAlign:'left',
              background:'transparent', color: C.navy400, fontSize:13, fontFamily:'inherit',
              transition:'all 150ms' }}>
            <Icon name={item.icon} size={16} color={C.navy500} />
            {item.label}
          </button>
        ))}
        {/* User */}
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 12px', marginTop:4 }}>
          <div style={{ width:28, height:28, borderRadius:'50%', background: C.navy700,
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:11, fontWeight:700, color:C.navy200, flexShrink:0 }}>김</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontSize:12, fontWeight:600, color:C.white, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>김지수</div>
            <div style={{ fontSize:10, color:C.navy400 }}>디자인팀</div>
          </div>
        </div>
      </div>
    </aside>
  );
};

// ── TOP BAR ───────────────────────────────────────────────
const TopBar = ({ title, subtitle }) => (
  <div style={{ height:56, background:C.white, borderBottom:`1px solid ${C.gray300}`,
    display:'flex', alignItems:'center', padding:'0 28px', gap:12,
    position:'sticky', top:0, zIndex:10 }}>
    <div style={{ flex:1 }}>
      <div style={{ fontSize:16, fontWeight:700, color:C.gray800, lineHeight:1.2 }}>{title}</div>
      {subtitle && <div style={{ fontSize:12, color:C.gray500, marginTop:1 }}>{subtitle}</div>}
    </div>
    <button style={{ display:'flex', alignItems:'center', gap:6, padding:'6px 12px',
      borderRadius:6, border:`1px solid ${C.gray300}`, background:C.white,
      color:C.gray600, fontSize:12, cursor:'pointer', fontFamily:'inherit' }}>
      <Icon name="bell" size={14} color={C.gray500} />
      알림
    </button>
  </div>
);

// ── STAT CARD ─────────────────────────────────────────────
const StatCard = ({ label, value, sub, accent }) => (
  <div style={{ background:C.white, border:`1px solid ${C.gray300}`, borderRadius:8,
    borderTop:`3px solid ${accent}`, padding:'16px 20px', flex:1,
    boxShadow:`0 1px 3px rgba(0,0,0,0.06)` }}>
    <div style={{ fontSize:11, fontWeight:600, color:C.gray500, textTransform:'uppercase',
      letterSpacing:'0.05em', marginBottom:4 }}>{label}</div>
    <div style={{ fontSize:28, fontWeight:700, color:C.navy900, lineHeight:1 }}>{value}</div>
    <div style={{ fontSize:12, color:C.gray500, marginTop:4 }}>{sub}</div>
  </div>
);

// ── ROOM CARD ─────────────────────────────────────────────
const RoomCard = ({ room, selected, onClick }) => (
  <div onClick={onClick} style={{ background:C.white, border:`1.5px solid ${selected ? C.navy400 : C.gray300}`,
    borderRadius:8, padding:'16px', cursor:'pointer', transition:'all 150ms',
    boxShadow: selected ? `0 0 0 3px rgba(66,153,225,0.15)` : `0 1px 3px rgba(0,0,0,0.06)` }}>
    <div style={{ fontSize:10, fontWeight:600, color:C.gray500, textTransform:'uppercase',
      letterSpacing:'0.05em', marginBottom:3 }}>{room.floor} · {room.wing}</div>
    <div style={{ fontSize:15, fontWeight:600, color:C.gray800, marginBottom:8 }}>{room.name}</div>
    <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:12, color:C.gray600, marginBottom:8 }}>
      <Icon name="users" size={12} color={C.gray500} />
      최대 {room.cap}인
    </div>
    <Badge type={room.status}>{room.status === 'available' ? '예약 가능' : '예약됨'}</Badge>
    <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginTop:8 }}>
      {room.amenities.map(a => <Tag key={a}>{a}</Tag>)}
    </div>
  </div>
);

// ── TIME SLOT GRID ────────────────────────────────────────
const TimeSlotGrid = ({ selected, onToggle }) => (
  <div style={{ display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap:4 }}>
    {ALL_SLOTS.map(slot => {
      const isBooked = BOOKED_SLOTS.includes(slot);
      const isMine = MY_SLOTS.includes(slot);
      const isSel = selected.includes(slot);
      let bg, color, border, cursor;
      if (isBooked) { bg=C.gray200; color=C.gray500; border=C.gray300; cursor='not-allowed'; }
      else if (isMine) { bg=C.navy50; color=C.navy600; border=C.navy100; cursor='default'; }
      else if (isSel) { bg=C.navy700; color=C.white; border=C.navy700; cursor='pointer'; }
      else { bg=C.white; color=C.navy700; border=C.gray300; cursor='pointer'; }
      return (
        <div key={slot} onClick={() => !isBooked && !isMine && onToggle(slot)}
          style={{ padding:'8px 4px', borderRadius:6, textAlign:'center', fontSize:11,
            fontFamily:"'Fira Code', monospace", background:bg, color, cursor,
            border:`1.5px solid ${border}`, transition:'all 120ms', userSelect:'none' }}>
          {slot}
        </div>
      );
    })}
  </div>
);

// ── RESERVATION ROW ───────────────────────────────────────
const ReservationRow = ({ r, onCancel }) => (
  <div style={{ display:'flex', alignItems:'center', gap:16, padding:'14px 20px',
    background:C.white, borderBottom:`1px solid ${C.gray200}`, transition:'background 120ms' }}>
    <div style={{ width:40, height:40, borderRadius:8, background: r.status==='past' ? C.gray200 : C.navy50,
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
      <Icon name="calendar" size={18} color={r.status==='past' ? C.gray500 : C.navy600} />
    </div>
    <div style={{ flex:1, minWidth:0 }}>
      <div style={{ fontSize:14, fontWeight:600, color:C.gray800 }}>{r.title}</div>
      <div style={{ fontSize:12, color:C.gray500, marginTop:2 }}>
        {r.room} ({r.floor}) · {r.date}
      </div>
    </div>
    <div style={{ textAlign:'right', flexShrink:0 }}>
      <div style={{ fontSize:13, fontFamily:"'Fira Code', monospace", color:C.navy700, fontWeight:500 }}>{r.time}</div>
      <div style={{ display:'flex', alignItems:'center', gap:4, fontSize:11, color:C.gray500, justifyContent:'flex-end', marginTop:3 }}>
        <Icon name="users" size={11} color={C.gray400} />
        {r.attendees}명
      </div>
    </div>
    <Badge type={r.status}>{r.status==='confirmed' ? '예약 확정' : '완료'}</Badge>
    {r.status === 'confirmed' && (
      <button onClick={() => onCancel(r.id)} style={{ padding:'5px 10px', borderRadius:6, border:`1px solid ${C.gray300}`,
        background:C.white, color:C.gray600, fontSize:11, cursor:'pointer', fontFamily:'inherit',
        whiteSpace:'nowrap' }}>취소</button>
    )}
  </div>
);

// ── BOOKING MODAL ─────────────────────────────────────────
const BookingModal = ({ room, selectedSlots, onClose, onConfirm }) => {
  const [title, setTitle] = React.useState('');
  const [attendees, setAttendees] = React.useState('');
  if (!room) return null;
  const slotLabel = selectedSlots.length ? `${selectedSlots[0]} – ${selectedSlots[selectedSlots.length-1].replace(':00',':30').replace(':30', '+30')}` : '미선택';
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.35)', display:'flex',
      alignItems:'center', justifyContent:'center', zIndex:100 }}
      onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ background:C.white, borderRadius:12, width:440, padding:'28px',
        boxShadow:'0 20px 40px rgba(0,0,0,0.12)' }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:20 }}>
          <div>
            <div style={{ fontSize:18, fontWeight:700, color:C.gray900 }}>예약 확인</div>
            <div style={{ fontSize:13, color:C.gray500, marginTop:2 }}>{room.name} · {room.floor}</div>
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', cursor:'pointer', padding:4 }}>
            <Icon name="x" size={20} color={C.gray400} />
          </button>
        </div>
        {/* Summary */}
        <div style={{ background:C.gray100, borderRadius:8, padding:'14px 16px', marginBottom:20, fontSize:13 }}>
          {[
            ['날짜', '2026.04.19 (금)'],
            ['시간', selectedSlots.length ? `${selectedSlots[0]} – ` + (() => {
              const last = selectedSlots[selectedSlots.length-1];
              const [h,m] = last.split(':').map(Number);
              return m===30 ? `${String(h+1).padStart(2,'0')}:00` : `${String(h).padStart(2,'0')}:30`;
            })() : '미선택'],
            ['장소', `${room.name} (${room.floor} · ${room.wing})`],
            ['수용 인원', `최대 ${room.cap}인`],
          ].map(([k,v]) => (
            <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'5px 0',
              borderBottom:`1px solid ${C.gray300}` }}>
              <span style={{ color:C.gray600 }}>{k}</span>
              <span style={{ fontWeight:500, color:C.gray800,
                fontFamily: k==='시간' ? "'Fira Code', monospace" : 'inherit' }}>{v}</span>
            </div>
          ))}
        </div>
        {/* Form */}
        <div style={{ marginBottom:14 }}>
          <label style={{ fontSize:12, fontWeight:500, color:C.gray700, display:'block', marginBottom:5 }}>예약 제목</label>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="예: 주간 팀 미팅"
            style={{ width:'100%', padding:'9px 12px', borderRadius:6, border:`1px solid ${C.gray400}`,
              fontSize:13, fontFamily:'inherit', outline:'none', color:C.gray800 }} />
        </div>
        <div style={{ marginBottom:20 }}>
          <label style={{ fontSize:12, fontWeight:500, color:C.gray700, display:'block', marginBottom:5 }}>참석 인원</label>
          <input value={attendees} onChange={e=>setAttendees(e.target.value)} placeholder={`최대 ${room.cap}인`} type="number"
            style={{ width:'100%', padding:'9px 12px', borderRadius:6, border:`1px solid ${C.gray400}`,
              fontSize:13, fontFamily:'inherit', outline:'none', color:C.gray800 }} />
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={onClose} style={{ flex:1, padding:'10px', borderRadius:6, border:`1.5px solid ${C.navy700}`,
            background:C.white, color:C.navy700, fontSize:14, fontWeight:500, cursor:'pointer', fontFamily:'inherit' }}>취소</button>
          <button onClick={onConfirm} style={{ flex:2, padding:'10px', borderRadius:6, border:'none',
            background:C.navy700, color:C.white, fontSize:14, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>예약하기</button>
        </div>
      </div>
    </div>
  );
};

// ── CONFIRMATION SCREEN ───────────────────────────────────
const ConfirmationBanner = ({ onDismiss }) => (
  <div style={{ background:C.greenLight, border:`1px solid ${C.green}20`, borderRadius:8,
    padding:'14px 20px', display:'flex', alignItems:'center', gap:12, marginBottom:20 }}>
    <Icon name="check-circle" size={20} color={C.green} />
    <div style={{ flex:1 }}>
      <div style={{ fontSize:13, fontWeight:600, color:'#276749' }}>예약이 완료되었습니다</div>
      <div style={{ fontSize:12, color:'#38A169', marginTop:1 }}>확인 메일이 발송되었습니다.</div>
    </div>
    <button onClick={onDismiss} style={{ background:'none', border:'none', cursor:'pointer', padding:4 }}>
      <Icon name="x" size={16} color={C.green} />
    </button>
  </div>
);

// ── DASHBOARD SCREEN ──────────────────────────────────────
const Dashboard = ({ onNav, showConfirmation, onDismissConfirmation }) => (
  <div style={{ padding:28 }}>
    {showConfirmation && <ConfirmationBanner onDismiss={onDismissConfirmation} />}
    <div style={{ display:'flex', gap:16, marginBottom:28 }}>
      <StatCard label="오늘 내 예약" value="3" sub="총 4.5시간" accent={C.navy700} />
      <StatCard label="가용 회의실" value="12" sub="전체 18개 중" accent={C.navy400} />
      <StatCard label="이번 주 이용률" value="74%" sub="↑ 지난주 대비 +8%" accent={C.green} />
    </div>
    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
      <div style={{ fontSize:15, fontWeight:600, color:C.gray800 }}>오늘의 예약</div>
      <button onClick={() => onNav('reservations')} style={{ fontSize:12, color:C.navy500,
        background:'none', border:'none', cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:3 }}>
        전체 보기 <Icon name="chevron" size={12} color={C.navy500} />
      </button>
    </div>
    <div style={{ background:C.white, borderRadius:8, border:`1px solid ${C.gray300}`, overflow:'hidden', boxShadow:`0 1px 3px rgba(0,0,0,0.06)` }}>
      {MY_RESERVATIONS.slice(0,2).map(r => <ReservationRow key={r.id} r={r} onCancel={() => {}} />)}
    </div>
    <div style={{ marginTop:24, marginBottom:14, display:'flex', justifyContent:'space-between', alignItems:'center' }}>
      <div style={{ fontSize:15, fontWeight:600, color:C.gray800 }}>빠른 예약</div>
    </div>
    <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:12 }}>
      {ROOMS.filter(r => r.status==='available').slice(0,3).map(room => (
        <RoomCard key={room.id} room={room} onClick={() => onNav('rooms')} />
      ))}
    </div>
  </div>
);

// ── ROOM SEARCH SCREEN ────────────────────────────────────
const RoomSearch = ({ onSelect }) => {
  const [query, setQuery] = React.useState('');
  const [selectedRoom, setSelectedRoom] = React.useState(null);
  const [selectedSlots, setSelectedSlots] = React.useState([]);
  const [showModal, setShowModal] = React.useState(false);

  const filtered = ROOMS.filter(r =>
    r.name.includes(query) || r.floor.includes(query) || r.wing.includes(query)
  );

  const toggleSlot = (slot) => {
    setSelectedSlots(prev => prev.includes(slot) ? prev.filter(s=>s!==slot) : [...prev, slot].sort());
  };

  return (
    <div style={{ padding:28 }}>
      {/* Search bar */}
      <div style={{ display:'flex', gap:10, marginBottom:20 }}>
        <div style={{ flex:1, position:'relative' }}>
          <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)' }}>
            <Icon name="search" size={14} color={C.gray500} />
          </div>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="회의실 이름 또는 층수 검색"
            style={{ width:'100%', padding:'9px 12px 9px 36px', borderRadius:6, border:`1px solid ${C.gray400}`,
              fontSize:13, fontFamily:'inherit', outline:'none', color:C.gray800 }} />
        </div>
        <button style={{ display:'flex', alignItems:'center', gap:6, padding:'9px 14px', borderRadius:6,
          border:`1px solid ${C.gray400}`, background:C.white, color:C.gray600, fontSize:13,
          cursor:'pointer', fontFamily:'inherit' }}>
          <Icon name="filter" size={14} color={C.gray500} />
          필터
        </button>
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20 }}>
        {/* Room list */}
        <div>
          <div style={{ fontSize:12, fontWeight:600, color:C.gray500, textTransform:'uppercase',
            letterSpacing:'0.05em', marginBottom:10 }}>회의실 목록 ({filtered.length})</div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {filtered.map(room => (
              <RoomCard key={room.id} room={room} selected={selectedRoom?.id===room.id}
                onClick={() => { if(room.status!=='booked') { setSelectedRoom(room); setSelectedSlots([]); }}} />
            ))}
          </div>
        </div>
        {/* Slot picker */}
        <div>
          {selectedRoom ? (
            <>
              <div style={{ fontSize:12, fontWeight:600, color:C.gray500, textTransform:'uppercase',
                letterSpacing:'0.05em', marginBottom:10 }}>시간 선택 — {selectedRoom.name}</div>
              <div style={{ background:C.white, borderRadius:8, padding:16, border:`1px solid ${C.gray300}`,
                boxShadow:`0 1px 3px rgba(0,0,0,0.06)`, marginBottom:12 }}>
                <TimeSlotGrid selected={selectedSlots} onToggle={toggleSlot} />
                <div style={{ display:'flex', gap:10, marginTop:12 }}>
                  {[['예약됨',C.gray300],['가능',C.white],['선택됨',C.navy700],['내 예약',C.navy50]].map(([l,bg]) => (
                    <div key={l} style={{ display:'flex', alignItems:'center', gap:4, fontSize:10, color:C.gray600 }}>
                      <div style={{ width:10, height:10, borderRadius:2, background:bg, border:`1px solid ${C.gray300}` }} />
                      {l}
                    </div>
                  ))}
                </div>
              </div>
              <button onClick={() => selectedSlots.length && setShowModal(true)}
                disabled={!selectedSlots.length}
                style={{ width:'100%', padding:'10px', borderRadius:6, border:'none',
                  background: selectedSlots.length ? C.navy700 : C.gray300,
                  color: selectedSlots.length ? C.white : C.gray500,
                  fontSize:14, fontWeight:600, cursor: selectedSlots.length ? 'pointer' : 'default',
                  fontFamily:'inherit', transition:'background 150ms' }}>
                {selectedSlots.length ? `${selectedSlots.length * 0.5}시간 예약하기` : '시간을 선택하세요'}
              </button>
            </>
          ) : (
            <div style={{ background:C.white, borderRadius:8, border:`1px solid ${C.gray300}`, padding:32,
              display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
              color:C.gray500, height:300, boxShadow:`0 1px 3px rgba(0,0,0,0.06)` }}>
              <Icon name="calendar" size={32} color={C.gray400} />
              <div style={{ marginTop:12, fontSize:13, fontWeight:500 }}>회의실을 선택하세요</div>
              <div style={{ fontSize:12, color:C.gray400, marginTop:4 }}>좌측에서 원하는 회의실을 클릭하면<br/>시간을 선택할 수 있습니다.</div>
            </div>
          )}
        </div>
      </div>
      {showModal && (
        <BookingModal room={selectedRoom} selectedSlots={selectedSlots}
          onClose={() => setShowModal(false)}
          onConfirm={() => { setShowModal(false); onSelect(); }} />
      )}
    </div>
  );
};

// ── MY RESERVATIONS SCREEN ────────────────────────────────
const MyReservations = () => {
  const [reservations, setReservations] = React.useState(MY_RESERVATIONS);
  const cancel = (id) => setReservations(prev => prev.filter(r => r.id !== id));
  return (
    <div style={{ padding:28 }}>
      <div style={{ display:'flex', gap:10, marginBottom:20 }}>
        {['전체','예약 확정','완료'].map((tab, i) => (
          <button key={tab} style={{ padding:'6px 14px', borderRadius:6, border:`1px solid ${i===0 ? C.navy700 : C.gray300}`,
            background: i===0 ? C.navy700 : C.white, color: i===0 ? C.white : C.gray600,
            fontSize:13, cursor:'pointer', fontFamily:'inherit', fontWeight: i===0 ? 600 : 400 }}>
            {tab}
          </button>
        ))}
      </div>
      <div style={{ background:C.white, borderRadius:8, border:`1px solid ${C.gray300}`,
        overflow:'hidden', boxShadow:`0 1px 3px rgba(0,0,0,0.06)` }}>
        {reservations.map(r => <ReservationRow key={r.id} r={r} onCancel={cancel} />)}
        {reservations.length === 0 && (
          <div style={{ padding:40, textAlign:'center', color:C.gray500 }}>
            <Icon name="calendar" size={32} color={C.gray400} />
            <div style={{ marginTop:10, fontSize:13 }}>예약 내역이 없습니다.</div>
          </div>
        )}
      </div>
    </div>
  );
};

// ── APP ───────────────────────────────────────────────────
const App = () => {
  const saved = (() => { try { return localStorage.getItem('bm_screen') || 'dashboard'; } catch { return 'dashboard'; }})();
  const [screen, setScreen] = React.useState(saved);
  const [showConfirmation, setShowConfirmation] = React.useState(false);

  const navigate = (s) => {
    setScreen(s);
    try { localStorage.setItem('bm_screen', s); } catch {}
  };

  const handleBookingComplete = () => {
    navigate('dashboard');
    setShowConfirmation(true);
  };

  const screenTitles = {
    dashboard: ['대시보드', '2026년 4월 19일 금요일'],
    rooms: ['회의실 찾기', '원하는 회의실과 시간을 선택하세요'],
    reservations: ['내 예약', '예약 내역을 확인하고 관리하세요'],
    settings: ['설정', ''],
  };

  return (
    <div style={{ display:'flex', minHeight:'100vh' }}>
      <Sidebar active={screen} onNav={navigate} />
      <div style={{ marginLeft:224, flex:1, display:'flex', flexDirection:'column', minHeight:'100vh' }}>
        <TopBar title={screenTitles[screen]?.[0]} subtitle={screenTitles[screen]?.[1]} />
        <div style={{ flex:1 }}>
          {screen === 'dashboard' && <Dashboard onNav={navigate} showConfirmation={showConfirmation} onDismissConfirmation={() => setShowConfirmation(false)} />}
          {screen === 'rooms' && <RoomSearch onSelect={handleBookingComplete} />}
          {screen === 'reservations' && <MyReservations />}
          {screen === 'settings' && (
            <div style={{ padding:28, color:C.gray500, fontSize:13 }}>설정 화면 (준비 중)</div>
          )}
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
