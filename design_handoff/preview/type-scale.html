<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
@font-face {
  font-family: 'WantedSans';
  src: url('../fonts/WantedSans-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
}
</style>
<style>
  body { margin: 0; padding: 20px 24px; background: #fff; font-family: var(--font-sans); }
  .specimen { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid #F0F4F8; }
  .specimen:last-child { border-bottom: none; }
  .meta { width: 120px; flex-shrink: 0; }
  .meta .size { font-size: 10px; font-family: 'Fira Code', monospace; color: #A0AEC0; }
  .meta .weight { font-size: 10px; color: #CBD5E0; }
  .sample-ko { color: #1A202C; }
  .sample-en { color: #718096; font-size: 12px; margin-left: 8px; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="meta"><div class="size">48px / Bold</div></div>
    <span class="sample-ko" style="font-size:48px;font-weight:700;line-height:1.2;letter-spacing:-0.025em">회의실 예약</span>
  </div>
  <div class="specimen">
    <div class="meta"><div class="size">32px / Bold</div></div>
    <span class="sample-ko" style="font-size:32px;font-weight:700;line-height:1.2;letter-spacing:-0.025em">오늘의 예약 현황</span>
  </div>
  <div class="specimen">
    <div class="meta"><div class="size">24px / SemiBold</div></div>
    <span class="sample-ko" style="font-size:24px;font-weight:600;line-height:1.375">사용 가능한 회의실</span>
  </div>
  <div class="specimen">
    <div class="meta"><div class="size">20px / SemiBold</div></div>
    <span class="sample-ko" style="font-size:20px;font-weight:600;line-height:1.375">한강뷰 회의실 (3층)</span>
  </div>
  <div class="specimen">
    <div class="meta"><div class="size">16px / Regular</div></div>
    <span class="sample-ko" style="font-size:16px;font-weight:400;line-height:1.625">예약 가능 여부를 확인하고 원하는 시간대를 선택하세요.</span>
  </div>
  <div class="specimen">
    <div class="meta"><div class="size">14px / Regular</div></div>
    <span class="sample-ko" style="font-size:14px;font-weight:400;color:#718096">최대 8인 · 화이트보드 · 프로젝터</span>
  </div>
  <div class="specimen">
    <div class="meta"><div class="size">12px Mono</div></div>
    <span style="font-size:13px;font-family:'Fira Code',monospace;color:#2C5282;background:#EBF8FF;padding:3px 8px;border-radius:4px">14:00 – 15:30</span>
  </div>
</body>
</html>
