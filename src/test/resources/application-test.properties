# Test DataSource (H2 in-memory, PostgreSQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA - auto DDL for test (Flyway disabled)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Schema initialization via schema.sql (H2-compatible)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-test.sql

# Flyway disabled for tests
spring.flyway.enabled=false

# JWT (test values)
jwt.secret=test-secret-key-must-be-at-least-32bytes!!
jwt.access-token-expiry=3600000
jwt.refresh-token-expiry=604800000

# OAuth2 dummy values for test context
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Disable data initializer in tests
app.init.enabled=false

# Cookie
cookie.secure=false

# OAuth2 redirect
oauth2.redirect-uri=http://localhost:3000/oauth2/callback
