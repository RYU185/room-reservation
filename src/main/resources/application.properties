spring.application.name=room-reservation

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/room_reservation
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:dev-only-256bit-secret-key-change-in-production-env}
jwt.access-token-expiry=3600000
jwt.refresh-token-expiry=604800000

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Logging
logging.level.com.ryu.room_reservation=INFO
logging.level.org.springframework.security=WARN
