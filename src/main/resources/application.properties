spring.application.name=room-reservation

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/room_reservation
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (운영 환경에서는 DDL_AUTO=validate 설정 필요)
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=30

# Flyway (개발 중 비활성화 - Spring Boot 4 모듈 이슈)
spring.flyway.enabled=false

# JWT (운영 환경에서 JWT_SECRET 환경변수 필수 설정)
jwt.secret=${JWT_SECRET:local-dev-secret-key-must-be-at-least-32bytes!!}
jwt.access-token-expiry=3600000
jwt.refresh-token-expiry=604800000

# CORS (쉼표 구분으로 여러 origin 허용 가능)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Cookie (운영 환경에서는 COOKIE_SECURE=true 설정 필요)
cookie.secure=${COOKIE_SECURE:false}

# Server
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# OAuth2 (소셜 로그인 성공 후 리다이렉트 URI)
oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

# OAuth2 Client Registration (실제 운영 시 환경변수로 교체 필요)
# 로컬 개발: GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET 미설정 시 dummy값으로 기동만 허용
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-dummy-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# Spring Data Web
spring.data.web.pageable.max-page-size=100

# Swagger (운영 환경에서 SWAGGER_ENABLED=false 설정 필요)
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:true}

# Data Initializer (운영 환경에서 APP_INIT_ENABLED=false 설정 필요)
app.init.enabled=${APP_INIT_ENABLED:true}
app.init.admin.email=${ADMIN_EMAIL:admin@example.com}
app.init.admin.password=${ADMIN_PASSWORD:admin1234!}

# Logging → logback-spring.xml 에서 관리
