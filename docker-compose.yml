services:
  postgres:
    image: postgres:16-alpine
    container_name: room-reservation-db
    environment:
      POSTGRES_DB: room_reservation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d room_reservation"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
